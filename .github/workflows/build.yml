name: CyberKid CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  ARCADE_SERVICE_PATH: 'arcade-service'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # подавляет предупреждения

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npx tsc --noEmit --skipLibCheck

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run test:coverage -- --passWithNoTests

  build-client:
    runs-on: ubuntu-latest
    needs: [typecheck, test-client]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: node scripts/generate-level-manifest.js
      - run: npm run build
      - uses: actions/upload-artifact@v5
        with:
          name: client-dist
          path: dist/

  test-arcade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd ${{ env.ARCADE_SERVICE_PATH }} && npm ci
      - run: cd ${{ env.ARCADE_SERVICE_PATH }} && npm run build
      - run: cd ${{ env.ARCADE_SERVICE_PATH }} && npm test || echo "No tests"

  docker-arcade:
    runs-on: ubuntu-latest
    needs: [test-arcade]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ env.ARCADE_SERVICE_PATH }}
          push: false
          tags: cyberkid-arcade:test

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-client]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: client-dist
          path: dist
      - uses: peaceiris/actions-gh-pages@v4   # пока нет v5, но переменная FORCE... поможет
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.number }}
          keep_files: true
      - uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${context.issue.number}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment: ${url}`
            });
