# .github/workflows/build.yml
# ПРОМЕТЕЙ: Исправленный CI/CD пайплайн для CyberKid.
# Добавлены проверки наличия скриптов, обновлены actions, учтены предупреждения Node.js 20.

name: CyberKid CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'                     # Обновлено до 22 (LTS)
  ARCADE_SERVICE_PATH: 'arcade-service'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Временный фикс для Node.js 20 предупреждений

jobs:
  # Линтинг клиентского кода (если скрипт существует)
  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Run linter if script exists
        run: |
          if npm run | grep -q '"lint"'; then
            npm run lint
          else
            echo "No lint script found, skipping"
          fi
      - run: npx tsc --noEmit

  # Тесты клиентского кода
  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Run tests with coverage
        run: |
          if npm run | grep -q '"test:coverage"'; then
            npm run test:coverage
          else
            npm test
          fi
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-client
          path: coverage/

  # Сборка клиента (проверка production-сборки)
  build-client:
    runs-on: ubuntu-latest
    needs: [lint-client, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Generate level manifest
        run: node scripts/generate-level-manifest.js
      - name: Build client
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: dist/

  # Установка зависимостей и тесты бэкенда Arcade
  test-arcade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install backend dependencies
        run: |
          cd ${{ env.ARCADE_SERVICE_PATH }}
          npm ci
      - name: Run backend tests (if any)
        run: |
          cd ${{ env.ARCADE_SERVICE_PATH }}
          if npm run | grep -q '"test"'; then
            npm test
          else
            echo "No tests found, skipping"
          fi
      - name: Build backend
        run: |
          cd ${{ env.ARCADE_SERVICE_PATH }}
          npm run build

  # Сборка Docker образа для Arcade
  docker-arcade:
    runs-on: ubuntu-latest
    needs: [test-arcade]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.ARCADE_SERVICE_PATH }}
          push: false
          tags: cyberkid-arcade:test

  # Деплой preview на GitHub Pages (для PR)
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-client]
    steps:
      - uses: actions/checkout@v4
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: dist
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.number }}
          keep_files: true
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${context.issue.number}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment: ${url}`
            });

  # Деплой клиента в production (на push в main)
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-client, docker-arcade]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: dist
      - name: Deploy to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist/*"
          target: "/var/www/cyberkid/"
      - name: Deploy Arcade backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/cyberkid-arcade
            docker-compose pull
            docker-compose up -d --force-recreate
