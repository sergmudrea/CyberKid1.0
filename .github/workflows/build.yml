# .github/workflows/build.yml
# ПРОМЕТЕЙ: CI/CD пайплайн для CyberKid.
# Автоматическая сборка, тестирование, линтинг и деплой клиента и бэкенда.
# Запускается на push в main и pull request.

name: CyberKid CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  ARCADE_SERVICE_PATH: 'arcade-service'

jobs:
  # Линтинг клиентского кода
  lint-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run lint --if-present
      - run: npx tsc --noEmit

  # Тесты клиентского кода
  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-client
          path: coverage/

  # Сборка клиента (проверка production-сборки)
  build-client:
    runs-on: ubuntu-latest
    needs: [lint-client, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Generate level manifest
        run: node scripts/generate-level-manifest.js
      - run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: dist/

  # Линтинг и тесты бэкенда Arcade
  test-arcade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd ${{ env.ARCADE_SERVICE_PATH }} && npm ci
      - run: cd ${{ env.ARCADE_SERVICE_PATH }} && npm run test --if-present
      - run: cd ${{ env.ARCADE_SERVICE_PATH }} && npm run build

  # Сборка Docker образа для Arcade (проверка)
  docker-arcade:
    runs-on: ubuntu-latest
    needs: [test-arcade]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.ARCADE_SERVICE_PATH }}
          push: false
          tags: cyberkid-arcade:test

  # Деплой клиента на GitHub Pages (опционально, для preview)
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-client]
    steps:
      - uses: actions/checkout@v4
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: dist
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-${{ github.event.number }}
          keep_files: true
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-${context.issue.number}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployment: ${url}`
            });

  # Деплой клиента в production (на push в main)
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-client, docker-arcade]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: dist
      - name: Deploy to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist/*"
          target: "/var/www/cyberkid/"
      - name: Deploy Arcade backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/cyberkid-arcade
            docker-compose pull
            docker-compose up -d --force-recreate
